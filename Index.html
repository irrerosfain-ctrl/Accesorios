<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AccesStock — Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --accent: #f0e040;
    --accent2: #40e0d0;
    --danger: #ff4d6d;
    --text: #f0eff4;
    --muted: #6e6e82;
    --border: #2a2a35;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .badge-count {
    background: var(--accent); color: #000;
    font-size: 0.72rem; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    font-family: 'DM Mono', monospace;
  }

  /* ── NAV TABS ── */
  nav {
    display: flex; gap: 6px;
    padding: 14px 20px 0;
  }
  .tab {
    flex: 1; padding: 10px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    border-radius: 10px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
    transition: all .2s;
  }
  .tab.active {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }

  /* ── SCREENS ── */
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }

  /* ── CAMERA SECTION ── */
  .cam-wrap {
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 4/3;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  #videoEl {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  #canvasEl { display: none; }
  .preview-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: var(--radius);
    display: none;
  }
  .cam-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px; color: var(--muted);
    font-size: 0.85rem;
  }
  .cam-placeholder svg { opacity: .4; }

  /* corner grid overlay */
  .cam-wrap::before {
    content: '';
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      linear-gradient(var(--accent) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, var(--accent) 1px, transparent 1px) 0 0 / 40px 40px;
    opacity: .04;
  }
  .crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 56px; height: 56px;
    border: 2px solid rgba(240,224,64,.6);
    border-radius: 6px;
    z-index: 3; pointer-events: none;
  }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px;
    border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    transition: all .18s; letter-spacing: .3px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:active { transform: scale(.97); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:active { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-accent2 { background: var(--accent2); color: #000; }

  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn-row .btn { flex: 1; }

  /* ── FORM ── */
  .form-group { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 6px;
  }
  input, select {
    width: 100%; padding: 13px 14px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 0.9rem;
    outline: none; transition: border-color .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .code-display {
    display: flex; align-items: center; gap: 10px;
  }
  .code-display input { flex: 1; }
  .regen-btn {
    padding: 13px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; color: var(--accent);
    font-size: 1rem; transition: all .2s;
    flex-shrink: 0;
  }
  .regen-btn:active { background: var(--border); }

  /* ── CARDS LIST ── */
  .search-bar {
    position: relative; margin-bottom: 16px;
  }
  .search-bar input { padding-left: 40px; }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 18px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 0.65rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

  .items-grid { display: flex; flex-direction: column; gap: 10px; }

  .item-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; gap: 0;
    transition: border-color .2s;
    cursor: pointer;
  }
  .item-card:active { border-color: var(--accent); }
  .item-thumb {
    width: 88px; height: 88px; flex-shrink: 0;
    object-fit: cover; background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.6rem;
  }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .item-info { padding: 12px 14px; flex: 1; min-width: 0; }
  .item-name {
    font-size: 0.95rem; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .item-code {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; color: var(--accent);
    background: rgba(240,224,64,.1);
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    margin-bottom: 6px;
  }
  .item-loc {
    font-size: 0.75rem; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    z-index: 200; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%; max-height: 90dvh;
    overflow-y: auto; padding: 24px 20px 40px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-photo {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; border-radius: 14px;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
  .modal-code {
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    color: var(--accent); margin-bottom: 14px;
  }
  .detail-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-key { color: var(--muted); min-width: 90px; font-size: 0.78rem; font-weight: 700; letter-spacing: .5px; }
  .detail-val { flex: 1; word-break: break-all; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }
  .empty h3 { font-size: 1rem; margin-bottom: 6px; }
  .empty p { font-size: 0.8rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000;
    font-weight: 700; font-size: 0.85rem;
    padding: 12px 24px; border-radius: 999px;
    z-index: 999; transition: transform .3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── FILE UPLOAD fallback ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius); padding: 24px;
    text-align: center; color: var(--muted);
    font-size: 0.85rem; cursor: pointer;
    transition: border-color .2s;
    margin-bottom: 12px;
  }
  .upload-zone:hover { border-color: var(--accent); }
  #fileInput { display: none; }

  select option { background: var(--card); }
</style>
</head>
<body>

<header>
  <div class="logo">Acces<span>Stock</span></div>
  <div class="badge-count" id="totalBadge">0 items</div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('register')">📷 Registrar</button>
  <button class="tab" onclick="switchTab('inventory')">📦 Inventario</button>
</nav>

<!-- ══ SCREEN: REGISTER ══ -->
<div class="screen active" id="screen-register">

  <!-- Foto -->
  <div class="cam-wrap" id="camWrap" onclick="document.getElementById('inputCamara').click()" style="cursor:pointer">
    <canvas id="canvasEl" style="display:none"></canvas>
    <img class="preview-img" id="previewImg" alt="preview">
    <div class="cam-placeholder" id="camPlaceholder">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.776 48.776 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
        <path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/>
      </svg>
      <span style="color:var(--accent);font-weight:700">Toca aquí para tomar foto</span>
      <span style="font-size:0.75rem">Abre la cámara o galería de Android</span>
    </div>
  </div>

  <!-- input captura nativa Android — funciona sin HTTPS -->
  <input type="file" id="inputCamara" accept="image/*" capture="environment" style="display:none" onchange="loadFoto(event)">
  <input type="file" id="inputGaleria" accept="image/*" style="display:none" onchange="loadFoto(event)">

  <div class="btn-row">
    <button class="btn btn-primary" onclick="document.getElementById('inputCamara').click()">
      📷 Tomar Foto
    </button>
    <button class="btn btn-outline" onclick="document.getElementById('inputGaleria').click()">
      🖼️ Galería
    </button>
  </div>

  <div id="captureRow" style="display:none" class="btn-row">
    <button class="btn btn-outline" onclick="retakePhoto()">↩ Cambiar foto</button>
  </div>

  <!-- Form -->
  <div class="form-group">
    <label>Nombre del Accesorio</label>
    <input type="text" id="fName" placeholder="ej. Collar de plata 925" autocomplete="off">
  </div>

  <div class="form-group">
    <label>Ubicación</label>
    <input type="text" id="fLocation" placeholder="ej. Vitrina 3, Cajón B" autocomplete="off">
  </div>

  <div class="form-group">
    <label>Categoría</label>
    <select id="fCategory">
      <option value="">— Seleccionar —</option>
      <option>Collar</option>
      <option>Pulsera</option>
      <option>Aretes</option>
      <option>Anillo</option>
      <option>Reloj</option>
      <option>Broche</option>
      <option>Cadena</option>
      <option>Otro</option>
    </select>
  </div>

  <div class="form-group">
    <label>Código de Localización</label>
    <div class="code-display">
      <input type="text" id="fCode" readonly placeholder="Auto-generado">
      <button class="regen-btn" onclick="generateCode()" title="Regenerar código">⟳</button>
    </div>
  </div>

  <div class="form-group">
    <label>Notas (opcional)</label>
    <input type="text" id="fNotes" placeholder="Material, precio, descripción...">
  </div>

  <button class="btn btn-primary" onclick="saveItem()" style="margin-top:4px">
    ✅ Guardar Accesorio
  </button>
</div>

<!-- ══ SCREEN: INVENTORY ══ -->
<div class="screen" id="screen-inventory">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statCats">0</div>
      <div class="stat-lbl">Categorías</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statLocs">0</div>
      <div class="stat-lbl">Ubicaciones</div>
    </div>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nombre, código, ubicación..." oninput="renderInventory()">
  </div>

  <div class="items-grid" id="itemsGrid"></div>
</div>

<!-- ══ MODAL DETAIL ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <img class="modal-photo" id="modalPhoto" src="" alt="">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-code" id="modalCode"></div>
    <div id="modalDetails"></div>
    <div style="height:16px"></div>
    <button class="btn btn-danger" id="modalDeleteBtn">🗑️ Eliminar registro</button>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let db = JSON.parse(localStorage.getItem('accestock_db') || '[]');
let currentPhoto = null;
let videoStream = null;
let currentModalId = null;
let cameraActive = false;

// ── INIT ──
generateCode();
renderInventory();
updateBadge();

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['register','inventory'][i] === name));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'inventory') renderInventory();
}

// ── CODE GENERATOR ──
function generateCode() {
  const prefix = ['ACC','LOC','REF','COD','STK'][Math.floor(Math.random()*5)];
  const nums = Math.floor(Math.random()*9000+1000);
  const alpha = String.fromCharCode(65+Math.floor(Math.random()*26)) + String.fromCharCode(65+Math.floor(Math.random()*26));
  document.getElementById('fCode').value = `${prefix}-${nums}-${alpha}`;
}

// ── FOTO (captura nativa Android - funciona sin HTTPS) ──
function loadFoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentPhoto = ev.target.result;
    const preview = document.getElementById('previewImg');
    preview.src = currentPhoto;
    preview.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('captureRow').style.display = 'flex';
    showToast('📸 Foto lista');
  };
  reader.readAsDataURL(file);
}

function retakePhoto() {
  currentPhoto = null;
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('captureRow').style.display = 'none';
  document.getElementById('camPlaceholder').style.display = 'flex';
}

// ── SAVE ──
function saveItem() {
  const name = document.getElementById('fName').value.trim();
  const location = document.getElementById('fLocation').value.trim();
  const category = document.getElementById('fCategory').value;
  const code = document.getElementById('fCode').value.trim();
  const notes = document.getElementById('fNotes').value.trim();

  if (!name) { showToast('⚠️ Ingresa el nombre'); return; }
  if (!location) { showToast('⚠️ Ingresa la ubicación'); return; }
  if (!code) { showToast('⚠️ Genera un código'); return; }

  const item = {
    id: Date.now().toString(),
    name, location, category, code, notes,
    photo: currentPhoto,
    date: new Date().toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' })
  };

  db.unshift(item);
  localStorage.setItem('accestock_db', JSON.stringify(db));
  showToast('✅ Accesorio guardado');
  resetForm();
  updateBadge();
  renderInventory();
}

function resetForm() {
  document.getElementById('fName').value = '';
  document.getElementById('fLocation').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fNotes').value = '';
  currentPhoto = null;
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('captureRow').style.display = 'none';
  document.getElementById('btnCamera').textContent = '📷 Abrir Cámara';
  if (videoStream) stopCamera();
  generateCode();
}

// ── RENDER INVENTORY ──
function renderInventory() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = db.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.code.toLowerCase().includes(q) ||
    i.location.toLowerCase().includes(q) ||
    (i.category||'').toLowerCase().includes(q)
  );

  const grid = document.getElementById('itemsGrid');

  // Stats
  const cats = new Set(db.map(i => i.category).filter(Boolean));
  const locs = new Set(db.map(i => i.location).filter(Boolean));
  document.getElementById('statTotal').textContent = db.length;
  document.getElementById('statCats').textContent = cats.size;
  document.getElementById('statLocs').textContent = locs.size;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <h3>${db.length === 0 ? 'Sin registros aún' : 'Sin resultados'}</h3>
      <p>${db.length === 0 ? 'Ve a Registrar para añadir tu primer accesorio' : 'Intenta con otro término de búsqueda'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <div class="item-card" onclick="openModal('${item.id}')">
      <div class="item-thumb">
        ${item.photo
          ? `<img src="${item.photo}" alt="${item.name}">`
          : '💎'}
      </div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-code">${item.code}</div>
        <div class="item-loc">📍 ${item.location}${item.category ? ' · ' + item.category : ''}</div>
      </div>
    </div>
  `).join('');
}

// ── MODAL ──
function openModal(id) {
  const item = db.find(i => i.id === id);
  if (!item) return;
  currentModalId = id;

  document.getElementById('modalPhoto').src = item.photo || '';
  document.getElementById('modalPhoto').style.display = item.photo ? 'block' : 'none';
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalCode').textContent = '🏷 ' + item.code;

  document.getElementById('modalDetails').innerHTML = `
    <div class="detail-row"><span class="detail-key">📍 Ubicación</span><span class="detail-val">${item.location}</span></div>
    ${item.category ? `<div class="detail-row"><span class="detail-key">🏷 Categoría</span><span class="detail-val">${item.category}</span></div>` : ''}
    ${item.notes ? `<div class="detail-row"><span class="detail-key">📝 Notas</span><span class="detail-val">${item.notes}</span></div>` : ''}
    <div class="detail-row"><span class="detail-key">📅 Fecha</span><span class="detail-val">${item.date}</span></div>
  `;

  document.getElementById('modalDeleteBtn').onclick = () => deleteItem(id);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function deleteItem(id) {
  if (!confirm('¿Eliminar este accesorio del inventario?')) return;
  db = db.filter(i => i.id !== id);
  localStorage.setItem('accestock_db', JSON.stringify(db));
  document.getElementById('modalOverlay').classList.remove('open');
  renderInventory();
  updateBadge();
  showToast('🗑️ Registro eliminado');
}

// ── UTILS ──
function updateBadge() {
  document.getElementById('totalBadge').textContent = db.length + (db.length === 1 ? ' item' : ' items');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// tap placeholder to start camera
document.getElementById('camPlaceholder').onclick = startCamera;
</script>
